<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance Wishlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .add-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .wishlist {
            display: grid;
            gap: 15px;
        }

        .wishlist-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: start;
            transition: transform 0.2s;
        }

        .wishlist-item:hover {
            transform: translateX(5px);
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .item-brand {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .item-notes {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .item-price {
            color: #28a745;
            font-weight: 700;
            font-size: 1.1em;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .stats {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats strong {
            color: #856404;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fragrance Wishlist</h1>

        <div class="stats" id="stats">
            <strong>0</strong> fragrances in your wishlist
        </div>

        <div class="add-form">
            <form id="fragranceForm">
                <div class="form-group">
                    <label for="name">Fragrance Name *</label>
                    <input type="text" id="name" required placeholder="e.g., Bleu de Chanel">
                </div>
                <div class="form-group">
                    <label for="brand">Brand *</label>
                    <input type="text" id="brand" required placeholder="e.g., Chanel">
                </div>
                <div class="form-group">
                    <label for="notes">Notes (Optional)</label>
                    <textarea id="notes" placeholder="Top, middle, base notes..."></textarea>
                </div>
                <div class="form-group">
                    <label for="price">Price (Optional)</label>
                    <input type="text" id="price" placeholder="e.g., $120">
                </div>
                <button type="submit" class="btn">Add to Wishlist</button>
            </form>
        </div>

        <div class="wishlist" id="wishlist"></div>
    </div>

    <script>
        let wishlist = [];

        function loadWishlist() {
            const stored = localStorage.getItem('fragranceWishlist');
            if (stored) {
                wishlist = JSON.parse(stored);
                renderWishlist();
            }
        }

        function saveWishlist() {
            localStorage.setItem('fragranceWishlist', JSON.stringify(wishlist));
        }

        function updateStats() {
            const count = wishlist.length;
            const statsEl = document.getElementById('stats');
            statsEl.innerHTML = `<strong>${count}</strong> fragrance${count !== 1 ? 's' : ''} in your wishlist`;
        }

        function renderWishlist() {
            const container = document.getElementById('wishlist');

            if (wishlist.length === 0) {
                container.innerHTML = '<div class="empty-state">Your wishlist is empty. Add your first fragrance above!</div>';
                updateStats();
                return;
            }

            container.innerHTML = wishlist.map((item, index) => `
                <div class="wishlist-item">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-brand">${item.brand}</div>
                        ${item.notes ? `<div class="item-notes">${item.notes}</div>` : ''}
                        ${item.price ? `<div class="item-price">${item.price}</div>` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${index})">Delete</button>
                </div>
            `).join('');

            updateStats();
        }

        function deleteItem(index) {
            if (confirm('Remove this fragrance from your wishlist?')) {
                wishlist.splice(index, 1);
                saveWishlist();
                renderWishlist();
            }
        }

        document.getElementById('fragranceForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const newFragrance = {
                name: document.getElementById('name').value.trim(),
                brand: document.getElementById('brand').value.trim(),
                notes: document.getElementById('notes').value.trim(),
                price: document.getElementById('price').value.trim()
            };

            wishlist.push(newFragrance);
            saveWishlist();
            renderWishlist();

            e.target.reset();
            document.getElementById('name').focus();
        });

        loadWishlist();
    </script>
</body>
</html>
